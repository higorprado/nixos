# ═══════════════════════════════════════════════════════════════════════════
# HYPRLAND CONFIGURATION - Replicates Niri/DMS setup
# ═══════════════════════════════════════════════════════════════════════════

# ── Environment Variables ─────────────────────────────────────────────────
env = XDG_CURRENT_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = QT_QPA_PLATFORMTHEME,gtk3
env = QT_QPA_PLATFORMTHEME_QT6,gtk3
# Fix VSCode/Electron rendering issues on Wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = NIXOS_OZONE_WL,1

# ── Monitor Configuration ──────────────────────────────────────────────────
# Match Niri setup: eDP-1 disabled, HDMI-A-1 primary at 4K 144Hz
monitor = eDP-1,disable
monitor = HDMI-A-1,3840x2160@144,0x0,1.5

# ── Startup Applications ───────────────────────────────────────────────────
exec-once = fcitx5 -d

# ── Input Configuration ───────────────────────────────────────────────────
input {
    kb_layout = us
    kb_variant = alt-intl
    kb_model = pc105
    kb_options = numpad:microsoft
    numlock_by_default = true
    follow_mouse = 1
    float_switch_override_focus = 1

    touchpad {
        natural_scroll = yes
        tap-to-click = yes
    }
}

# ── General Settings ───────────────────────────────────────────────────────
general {
    gaps_in = 5
    # gaps_out: top, right, bottom, left (matches Niri struts: 100, 270, 220, 270)
    gaps_out = 100, 270, 220, 270
    border_size = 2

    # Colors from Niri: Active #b2c5ff, Inactive #8f909a
    col.active_border = 0xffb2c5ff
    col.inactive_border = 0xff8f909a

    layout = scrolling
}

# ── Decoration Settings ───────────────────────────────────────────────────
decoration {
    rounding = 16

    shadow {
        enabled = yes
        range = 30
        render_power = 3
        color = 0x80000000
    }

    blur {
        enabled = yes
        size = 5
        passes = 3
    }
}

# ── Scrolling Layout Configuration ────────────────────────────────────────
scrolling {
    column_width = 0.5
    follow_focus = true
    explicit_column_widths = 0.2, 0.5, 0.6, 0.8
    direction = right
}

# ── Animations ───────────────────────────────────────────────────────────
animations {
    enabled = yes
    animation = workspaces, 1, 3, default
    animation = windows, 1, 0.15, default
    animation = layers, 1, 0.15, default
}

# ── Window Rules ─────────────────────────────────────────────────────────
windowrule = match:class ^thunar$, float 1
windowrule = match:class ^org.gnome.FileRoller$, float 1
windowrule = match:class ^nemo$, match:title .*Properties, float 1
windowrule = match:focus 1, opacity 0.99

# ── Layer Rules ──────────────────────────────────────────────────────────
# DMS shell layers
layerrule = no_anim 1, match:namespace ^(dms|DMS).*$
layerrule = blur 1, match:namespace ^(dms|DMS).*$

# ── Keybindings ───────────────────────────────────────────────────────────
$mainMod = SUPER

# Application Launchers
bind = CTRL, SPACE, exec, dms ipc spotlight toggle
bind = $mainMod, SPACE, exec, dms ipc spotlight toggle
bind = $mainMod CTRL, T, exec, kitty
bind = $mainMod CTRL, F, exec, nemo
bind = $mainMod CTRL, B, exec, firefox
bind = $mainMod CTRL, Z, exec, zed
bind = $mainMod CTRL, V, exec, code

# System
bind = $mainMod, D, exec, dms ipc overview toggle
bind = $mainMod SHIFT, L, exec, dms ipc lock lock

# Window Management
bind = ALT, F4, killactive
bind = $mainMod, M, fullscreen
bind = $mainMod, KP_Multiply, fullscreen
bind = $mainMod ALT, slash, togglefloating
bind = $mainMod ALT, KP_Divide, togglefloating
bind = $mainMod, period, centerwindow
bind = $mainMod, KP_Delete, centerwindow
bind = $mainMod, comma, togglefloating
bind = $mainMod, KP_Insert, togglefloating

# Focus Navigation
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, KP_Left, movefocus, l
bind = $mainMod, KP_Right, movefocus, r
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, down, movefocus, d
bind = $mainMod, up, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u

# Move Windows
bind = $mainMod ALT, left, layoutmsg, move -col
bind = $mainMod ALT, right, layoutmsg, move +col
bind = $mainMod ALT, H, layoutmsg, move -col
bind = $mainMod ALT, L, layoutmsg, move +col
bind = $mainMod ALT, down, movewindow, d
bind = $mainMod ALT, up, movewindow, u
bind = $mainMod ALT, J, movewindow, d
bind = $mainMod ALT, K, movewindow, u

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod ALT, 1, movetoworkspace, 1
bind = $mainMod ALT, 2, movetoworkspace, 2
bind = $mainMod ALT, 3, movetoworkspace, 3
bind = $mainMod ALT, 4, movetoworkspace, 4
bind = $mainMod ALT, 5, movetoworkspace, 5
bind = $mainMod ALT, 6, movetoworkspace, 6
bind = $mainMod ALT, 7, movetoworkspace, 7
bind = $mainMod ALT, 8, movetoworkspace, 8
bind = $mainMod ALT, 9, movetoworkspace, 9

# Sizing
bind = $mainMod, bracketleft, resizeactive, 0 -10
bind = $mainMod, bracketright, resizeactive, 0 10
bind = $mainMod ALT, bracketleft, layoutmsg, colresize -0.1
bind = $mainMod ALT, bracketright, layoutmsg, colresize +0.1
bind = $mainMod, G, layoutmsg, cyclewidth
bind = $mainMod SHIFT, G, layoutmsg, cycleheight
bind = $mainMod, U, togglefloating

# Audio Controls (with repeat)
bindle = , XF86AudioRaiseVolume, exec, dms ipc audio increment 3
bindle = , XF86AudioLowerVolume, exec, dms ipc audio decrement 3
bind = , XF86AudioMute, exec, dms ipc audio mute
bind = , XF86AudioMicMute, exec, dms ipc audio micmute

# Media Controls
bind = , XF86AudioPlay, exec, dms ipc mpris playPause
bind = , XF86AudioNext, exec, dms ipc mpris next
bind = , XF86AudioPrev, exec, dms ipc mpris previous

# Brightness Controls (with repeat)
bindle = , XF86MonBrightnessUp, exec, dms ipc brightness increment 5
bindle = , XF86MonBrightnessDown, exec, dms ipc brightness decrement 5

# Screenshots
bind = $mainMod SHIFT, 4, exec, grimblast --notify copy area
bind = $mainMod SHIFT, 3, exec, grimblast --notify copy screen
