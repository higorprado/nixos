# Hyprland configuration for the caelestia-hyprland desktop profile.
# Goal: keep behavior close to the current Niri workflow.

# Environment
env = XDG_CURRENT_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,gtk3
env = QT_QPA_PLATFORMTHEME_QT6,gtk3
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = NIXOS_OZONE_WL,1

# Monitors
monitor = eDP-1,disable
monitor = HDMI-A-1,3840x2160@144,0x0,1.5

# Startup
exec-once = dbus-update-activation-environment --systemd --all
exec-once = fcitx5 -d

# Input
input {
    kb_layout = us
    kb_variant = alt-intl
    kb_model = pc105
    kb_options = numpad:microsoft
    numlock_by_default = true
    follow_mouse = 1

    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

# Layout and geometry (mapped from Niri struts/presets)
general {
    gaps_in = 5
    gaps_out = 100, 270, 220, 270
    border_size = 2

    col.active_border = 0xffb2c5ff
    col.inactive_border = 0xff8f909a

    layout = scrolling
}

decoration {
    rounding = 16
    active_opacity = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 30
        render_power = 3
        color = 0x80000000
    }

    blur {
        enabled = true
        size = 5
        passes = 2
    }
}

scrolling {
    column_width = 0.5
    follow_focus = true
    explicit_column_widths = 0.2, 0.5, 0.6, 0.8
    direction = right
}

animations {
    enabled = yes
    animation = workspaces, 1, 3, default
    animation = windows, 1, 3, default
    animation = layers, 1, 3, default
}

# Window rules
windowrule = float on, match:class ^(thunar)$
windowrule = float on, match:class ^(org\\.gnome\\.FileRoller)$
windowrule = float on, match:class ^(nemo)$, match:title .*Properties$

$mainMod = SUPER

# Applications
bind = CTRL, SPACE, exec, caelestia shell drawers toggle launcher
bind = $mainMod, SPACE, exec, caelestia shell drawers toggle launcher
bind = $mainMod CTRL, T, exec, kitty
bind = $mainMod CTRL, F, exec, nemo
bind = $mainMod CTRL, B, exec, firefox
bind = $mainMod CTRL, Z, exec, zed
bind = $mainMod CTRL, V, exec, code

# System
bind = $mainMod, D, exec, caelestia shell drawers toggle dashboard
bind = $mainMod SHIFT, L, exec, caelestia shell lock lock

# Window management
bind = ALT, F4, killactive
bind = $mainMod, M, fullscreen
bind = $mainMod, KP_Multiply, fullscreen
bind = $mainMod ALT, slash, togglefloating
bind = $mainMod ALT, KP_Divide, togglefloating
bind = $mainMod, period, layoutmsg, fit active
bind = $mainMod, KP_Delete, layoutmsg, fit active
bind = $mainMod, comma, layoutmsg, colresize 1.0
bind = $mainMod, KP_Insert, layoutmsg, colresize 1.0

# Focus navigation
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, KP_Left, movefocus, l
bind = $mainMod, KP_Right, movefocus, r
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, down, movefocus, d
bind = $mainMod, up, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u

# Move windows/columns
bind = $mainMod ALT, left, layoutmsg, swapcol l
bind = $mainMod ALT, right, layoutmsg, swapcol r
bind = $mainMod ALT, H, layoutmsg, swapcol l
bind = $mainMod ALT, L, layoutmsg, swapcol r
bind = $mainMod ALT, down, movewindow, d
bind = $mainMod ALT, up, movewindow, u
bind = $mainMod ALT, J, movewindow, d
bind = $mainMod ALT, K, movewindow, u

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod ALT, 1, movetoworkspace, 1
bind = $mainMod ALT, 2, movetoworkspace, 2
bind = $mainMod ALT, 3, movetoworkspace, 3
bind = $mainMod ALT, 4, movetoworkspace, 4
bind = $mainMod ALT, 5, movetoworkspace, 5
bind = $mainMod ALT, 6, movetoworkspace, 6
bind = $mainMod ALT, 7, movetoworkspace, 7
bind = $mainMod ALT, 8, movetoworkspace, 8
bind = $mainMod ALT, 9, movetoworkspace, 9

# Sizing
bind = $mainMod, bracketleft, resizeactive, 0 -10
bind = $mainMod, bracketright, resizeactive, 0 10
bind = $mainMod ALT, bracketleft, layoutmsg, colresize -0.1
bind = $mainMod ALT, bracketright, layoutmsg, colresize +0.1
bind = $mainMod, G, layoutmsg, colresize +conf
bind = $mainMod SHIFT, G, layoutmsg, colresize -conf
bind = $mainMod, U, togglefloating

# Audio and media (works on lockscreen)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 3%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 3%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86AudioPlay, exec, caelestia shell mpris playPause
bindl = , XF86AudioNext, exec, caelestia shell mpris next
bindl = , XF86AudioPrev, exec, caelestia shell mpris previous

# Brightness
bindel = , XF86MonBrightnessUp, exec, caelestia shell brightness set +5%
bindel = , XF86MonBrightnessDown, exec, caelestia shell brightness set 5%-

# Screenshots
bind = $mainMod SHIFT, 4, exec, caelestia shell picker openFreezeClip
bind = $mainMod SHIFT, 3, exec, grimblast --notify copy screen
