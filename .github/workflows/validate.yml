name: validate

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:
  workflow_dispatch:

jobs:
  lint-structure:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Structure Gates
        run: |
          ./scripts/run-validation-gates.sh structure

  predator-eval-build:
    runs-on: ubuntu-latest
    needs: lint-structure
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Predator Validation Gates
        run: |
          ./scripts/run-validation-gates.sh predator

  server-example-eval-build:
    runs-on: ubuntu-latest
    needs: lint-structure
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Server Example Validation Gates
        run: |
          ./scripts/run-validation-gates.sh server-example
